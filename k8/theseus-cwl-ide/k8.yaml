apiVersion: apps/v1
kind: Deployment
metadata:
  name: theseus-cwl-ide
spec:
  replicas: 1
  selector:
    matchLabels:
      app: theseus-cwl-ide
  template:
    metadata:
      labels:
        app: theseus-cwl-ide
    spec:
      containers:
        - name: theseus-cwl-ide
          image: theseus-ide:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: theseus-cwl-ide-service
spec:
  type: NodePort
  selector:
    app: theseus-cwl-ide
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30007