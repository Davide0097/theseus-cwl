apiVersion: apps/v1
kind: Deployment
metadata:
  name: theseus-validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: theseus-validator
  template:
    metadata:
      labels:
        app: theseus-validator
    spec:
      containers:
        - name: theseus-validator
          image: theseus-validator:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
---
apiVersion: v1
kind: Service
metadata:
  name: theseus-validator-service
spec:
  type: NodePort
  selector:
    app: theseus-validator
  ports:
    - port: 3003
      targetPort: 3003
      nodePort: 30008