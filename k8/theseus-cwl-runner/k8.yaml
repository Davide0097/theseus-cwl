apiVersion: apps/v1
kind: Deployment
metadata:
  name: theseus-cwl-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: theseus-cwl-runner
  template:
    metadata:
      labels:
        app: theseus-cwl-runner
    spec:
      containers:
        - name: theseus-cwl-runner
          image: theseus-cwl-runner:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: theseus-cwl-runner-service
spec:
  type: NodePort
  selector:
    app: theseus-cwl-runner
  ports:
    - port: 3004
      targetPort: 3004
      nodePort: 30009